<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intrusion Alert Tracker</title>
<link rel="icon" type="image/x-icon" href="./favicon.ico?v=2">
<link rel="shortcut icon" type="image/x-icon" href="./favicon.ico?v=2">
<link rel="icon" type="image/png" href="./favicon.png?v=2">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10;
    --bg2: #0d1117;
    --bg3: #111822;
    --border: #1e2d3d;
    --border2: #243447;
    --text: #d9e7f3;
    --text2: #a1b8ca;
    --text3: #7892a6;
    --accent: #00d4ff;
    --accent2: #0090b3;
    --critical: #ff3b3b;
    --high: #ff7c2a;
    --medium: #f5c518;
    --low: #4caf7d;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Rajdhani', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 16px;
  }

  #header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-mark {
    width: 32px;
    height: 32px;
    border: 1.5px solid var(--accent);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .logo-mark::before {
    content: '';
    width: 10px;
    height: 10px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  h1 {
    font-family: var(--mono);
    font-size: 15px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .subtitle {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
    letter-spacing: 1px;
  }

  #stats-bar {
    display: flex;
    gap: 20px;
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
  }

  .stat-val {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 600;
    line-height: 1;
  }

  .stat-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text2);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .s-critical { color: var(--critical); }
  .s-high { color: var(--high); }
  .s-medium { color: var(--medium); }
  .s-low { color: var(--low); }
  .s-total { color: var(--accent); }

  #header-right {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  #upload-btn {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid var(--accent2);
    color: var(--accent);
    padding: 6px 14px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s;
  }

  #upload-btn:hover {
    background: var(--accent2);
    color: var(--bg);
  }

  #file-input { display: none; }

  /* ── TIMELINE ── */
  #timeline-container {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    flex-shrink: 0;
    overflow: hidden;
  }

  #timeline-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .section-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text2);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  #filters {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .filter-btn {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 2px;
    border: 1px solid;
    cursor: pointer;
    transition: all 0.15s;
    background: transparent;
  }

  .filter-btn.critical { border-color: var(--critical); color: var(--critical); }
  .filter-btn.high     { border-color: var(--high);     color: var(--high); }
  .filter-btn.medium   { border-color: var(--medium);   color: var(--medium); }
  .filter-btn.low      { border-color: var(--low);      color: var(--low); }
  .filter-btn.all      { border-color: var(--border2);  color: var(--text2); }

  .filter-btn.active.critical { background: var(--critical); color: var(--bg); }
  .filter-btn.active.high     { background: var(--high);     color: var(--bg); }
  .filter-btn.active.medium   { background: var(--medium);   color: var(--bg); }
  .filter-btn.active.low      { background: var(--low);      color: var(--bg); }
  .filter-btn.active.all      { background: var(--border2);  color: var(--text); }

  #date-range {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  #date-range input {
    font-family: var(--mono);
    font-size: 11px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 3px 8px;
    border-radius: 2px;
    color-scheme: dark;
  }

  .date-sep {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
  }

  #timeline-scroll {
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }

  #timeline-track {
    position: relative;
    height: 104px;
    min-width: 100%;
  }

  #timeline-axis {
    position: absolute;
    top: 40px;
    left: 0;
    right: 0;
    height: 1px;
    background: var(--border);
  }

  .tl-event {
    position: absolute;
    top: 0;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
  }

  .tl-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: 2px solid var(--bg2);
    margin-top: 24px;
    transition: transform 0.15s;
    position: relative;
    z-index: 2;
  }

  .tl-event:hover .tl-dot {
    transform: scale(1.6);
  }

  .tl-event.active .tl-dot {
    transform: scale(1.6);
    box-shadow: 0 0 6px currentColor;
  }

  .tl-line {
    width: 1px;
    height: 16px;
    background: currentColor;
    opacity: 0.4;
  }

  .tl-label {
    font-family: var(--mono);
    font-size: 13px;
    color: #eef9ff;
    font-weight: 600;
    text-shadow: 0 0 10px rgba(8, 12, 16, 0.9);
    white-space: nowrap;
    position: absolute;
    top: 54px;
    transform: translateX(-50%);
  }

  .tl-scale-tick {
    position: absolute;
    top: 40px;
    width: 1px;
    height: 8px;
    background: var(--border2);
    opacity: 0.9;
  }

  .tl-scale-label {
    position: absolute;
    top: 12px;
    transform: translateX(-50%);
    font-family: var(--mono);
    font-size: 19px;
    color: #9dc8e3;
    white-space: nowrap;
    letter-spacing: 1px;
  }

  /* ── BODY ── */
  #body {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── MAP ── */
  #map {
    flex: 1;
    z-index: 1;
  }

  /* ── SIDEBAR ── */
  #sidebar {
    width: 420px;
    background: var(--bg2);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  #sidebar-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  #alert-count {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
  }

  #alerts-list {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }

  .alert-item {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  .alert-item:hover { background: var(--bg3); }
  .alert-item.selected { background: var(--bg3); border-left: 2px solid var(--accent); }

  .alert-sev-bar {
    width: 3px;
    border-radius: 2px;
    flex-shrink: 0;
    align-self: stretch;
    min-height: 40px;
  }

  .alert-body { flex: 1; min-width: 0; }

  .alert-subject {
    font-family: var(--sans);
    font-size: 18px;
    font-weight: 600;
    color: #eef9ff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 6px;
  }

  .alert-meta {
    font-family: var(--mono);
    font-size: 13px;
    color: #d9f1ff;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .sev-badge {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 1px 6px;
    border-radius: 2px;
    font-weight: 600;
    flex-shrink: 0;
  }

  /* ── DETAIL PANEL ── */
  #detail-panel {
    border-top: 1px solid var(--border);
    padding: 18px 22px;
    min-height: 180px;
    max-height: 320px;
    overflow-y: auto;
    display: none;
  }

  #detail-panel.visible { display: block; }

  .detail-title {
    font-family: var(--sans);
    font-size: 24px;
    font-weight: 600;
    color: #eef9ff;
    margin-bottom: 14px;
  }

  .detail-grid {
    display: grid;
    grid-template-columns: 120px 1fr;
    gap: 8px 14px;
    font-family: var(--mono);
    font-size: 18px;
  }

  .detail-key { color: #b9e7ff; }
  .detail-val { color: #e6f6ff; word-break: break-all; }

  .detail-desc {
    margin-top: 10px;
    font-family: var(--sans);
    font-size: 18px;
    color: #39f0ff;
    line-height: 1.55;
    font-weight: 600;
    border-top: 1px solid var(--border);
    padding-top: 12px;
  }

  /* ── EMPTY STATE ── */
  #empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 8px;
    color: var(--text2);
    font-family: var(--mono);
    font-size: 13px;
    text-align: center;
    padding: 20px;
  }

  .empty-icon {
    font-size: 28px;
    margin-bottom: 4px;
    opacity: 0.4;
  }

  /* severity colors util */
  .c-critical { color: var(--critical); }
  .c-high { color: var(--high); }
  .c-medium { color: var(--medium); }
  .c-low { color: var(--low); }
  .bg-critical { background: var(--critical); color: #000; }
  .bg-high { background: var(--high); color: #000; }
  .bg-medium { background: var(--medium); color: #000; }
  .bg-low { background: var(--low); color: #000; }

  /* Leaflet dark override */
  .leaflet-container { background: #0a0e14 !important; }
  .leaflet-tile { filter: brightness(0.85) saturate(0.7) hue-rotate(180deg) invert(1) hue-rotate(180deg); }

  .custom-popup .leaflet-popup-content-wrapper {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 15px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
  }
  .custom-popup .leaflet-popup-tip { background: var(--bg2); }

  .popup-content h4 {
    font-family: var(--sans);
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 6px;
    color: #eef9ff;
  }

  .popup-content .popup-row {
    display: flex;
    gap: 8px;
    color: #e6f6ff;
    margin: 6px 0;
    font-size: 18px;
    line-height: 1.35;
  }

  .popup-content .popup-row span:first-child {
    color: #b9e7ff;
    min-width: 96px;
  }

  /* no-data */
  #no-data {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text2);
    text-align: center;
    z-index: 1000;
    pointer-events: none;
  }

  .map-marker {
    position: relative;
    width: 18px;
    height: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .map-marker-core {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 2px solid rgba(255, 255, 255, 0.85);
    box-shadow: 0 0 10px currentColor;
    position: relative;
    z-index: 2;
  }

  .map-marker-pulse {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.28;
    animation: markerPulse 1.8s ease-out infinite;
    z-index: 1;
  }

  @keyframes markerPulse {
    0% {
      transform: scale(0.55);
      opacity: 0.55;
    }
    70% {
      transform: scale(1.9);
      opacity: 0;
    }
    100% {
      transform: scale(1.9);
      opacity: 0;
    }
  }

  @media (max-width: 1200px) {
    h1 { font-size: 14px; }
    .subtitle { font-size: 10px; }
    .stat-val { font-size: 18px; }
    .alert-subject { font-size: 16px; }
    .alert-meta,
    .detail-grid,
    .popup-content .popup-row { font-size: 14px; }
    .popup-content h4 { font-size: 20px; }
    .detail-title { font-size: 20px; }
    .detail-desc { font-size: 16px; }
    .tl-label { font-size: 11px; }
    .tl-scale-label { font-size: 10px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div id="header-left">
    <div class="logo-mark"></div>
    <div>
      <h1>Intrusion Alert Tracker</h1>
      <div class="subtitle">Geo-threat visualization · v1.0</div>
    </div>
  </div>

  <div id="stats-bar">
    <div class="stat">
      <span class="stat-val s-critical" id="stat-critical">0</span>
      <span class="stat-label">critical</span>
    </div>
    <div class="stat">
      <span class="stat-val s-high" id="stat-high">0</span>
      <span class="stat-label">high</span>
    </div>
    <div class="stat">
      <span class="stat-val s-medium" id="stat-medium">0</span>
      <span class="stat-label">medium</span>
    </div>
    <div class="stat">
      <span class="stat-val s-low" id="stat-low">0</span>
      <span class="stat-label">low</span>
    </div>
    <div class="stat">
      <span class="stat-val s-total" id="stat-total">0</span>
      <span class="stat-label">total</span>
    </div>
  </div>

  <div id="header-right">
    <button id="upload-btn" onclick="document.getElementById('file-input').click()">
      ↑ Load CSV
    </button>
    <input type="file" id="file-input" accept=".csv">
  </div>
</div>

<!-- TIMELINE -->
<div id="timeline-container">
  <div id="timeline-header">
    <span class="section-label">// timeline de eventos</span>
    <div style="display:flex; gap:16px; align-items:center; flex-wrap:wrap;">
      <div id="date-range">
        <input type="date" id="date-from" title="Desde">
        <span class="date-sep">→</span>
        <input type="date" id="date-to" title="Hasta">
        <button class="filter-btn all" id="clear-dates" onclick="clearDates()">clear</button>
      </div>
      <div id="filters">
        <button class="filter-btn all active" data-sev="all" onclick="toggleFilter(this)">all</button>
        <button class="filter-btn critical" data-sev="critical" onclick="toggleFilter(this)">critical</button>
        <button class="filter-btn high" data-sev="high" onclick="toggleFilter(this)">high</button>
        <button class="filter-btn medium" data-sev="medium" onclick="toggleFilter(this)">medium</button>
        <button class="filter-btn low" data-sev="low" onclick="toggleFilter(this)">low</button>
      </div>
    </div>
  </div>
  <div id="timeline-scroll">
    <div id="timeline-track">
      <div id="timeline-axis"></div>
    </div>
  </div>
</div>

<!-- BODY -->
<div id="body">
  <div id="map"></div>
  <div id="sidebar">
    <div id="sidebar-header">
      <span class="section-label">// alert log</span>
      <span id="alert-count" class="alert-count">0 events</span>
    </div>
    <div id="alerts-list">
      <div id="empty-state">
        <div class="empty-icon">⬡</div>
        <div>No hay alertas cargadas</div>
        <div style="margin-top:6px; font-size:9px;">Cargá un archivo CSV con el botón de arriba</div>
        <div style="margin-top:4px; font-size:9px; color: #2a4050;">o usá el CSV de muestra incluido</div>
      </div>
    </div>
    <div id="detail-panel"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script>

// ── STATE ──
let allAlerts = [];
let filteredAlerts = [];
let activeFilter = 'all';
let markers = {};
let selectedId = null;
let map;

const SEV_COLOR = {
  critical: '#ff3b3b',
  high:     '#ff7c2a',
  medium:   '#f5c518',
  low:      '#4caf7d'
};

// ── MAP INIT ──
map = L.map('map', {
  center: [30, 10],
  zoom: 2,
  zoomControl: true,
  attributionControl: false
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18
}).addTo(map);

L.control.attribution({ prefix: false })
  .addAttribution('© <a href="https://osm.org/copyright" style="color:#4a6070">OpenStreetMap</a>')
  .addTo(map);

// ── CSV PARSING ──
document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  Papa.parse(file, {
    header: true,
    skipEmptyLines: true,
    complete: res => loadData(res.data)
  });
});

function loadData(data) {
  allAlerts = data.map((row, i) => ({
    id: row.id || String(i + 1),
    timestamp: row.timestamp || '',
    ip: row.ip || '',
    lat: parseFloat(row.lat),
    lon: parseFloat(row.lon),
    city: row.city || '',
    country: row.country || '',
    severity: (row.severity || 'low').toLowerCase(),
    subject: row.subject || 'Alert',
    description: row.description || ''
  })).filter(a => !isNaN(a.lat) && !isNaN(a.lon));

  // Set date range defaults
  const timestamps = allAlerts.map(a => a.timestamp).filter(Boolean).sort();
  if (timestamps.length) {
    document.getElementById('date-from').value = timestamps[0].slice(0, 10);
    document.getElementById('date-to').value = timestamps[timestamps.length - 1].slice(0, 10);
  }

  applyFilters();
}

// ── FILTERS ──
function toggleFilter(btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.sev;
  applyFilters();
}

function clearDates() {
  document.getElementById('date-from').value = '';
  document.getElementById('date-to').value = '';
  applyFilters();
}

document.getElementById('date-from').addEventListener('change', applyFilters);
document.getElementById('date-to').addEventListener('change', applyFilters);

function applyFilters() {
  const from = document.getElementById('date-from').value;
  const to = document.getElementById('date-to').value;

  filteredAlerts = allAlerts.filter(a => {
    if (activeFilter !== 'all' && a.severity !== activeFilter) return false;
    if (from && a.timestamp && a.timestamp.slice(0, 10) < from) return false;
    if (to && a.timestamp && a.timestamp.slice(0, 10) > to) return false;
    return true;
  });

  renderAll();
}

// ── RENDER ──
function renderAll() {
  renderStats();
  renderMap();
  renderTimeline();
  renderList();
}

function renderStats() {
  const counts = { critical: 0, high: 0, medium: 0, low: 0 };
  filteredAlerts.forEach(a => { if (counts[a.severity] !== undefined) counts[a.severity]++; });
  document.getElementById('stat-critical').textContent = counts.critical;
  document.getElementById('stat-high').textContent = counts.high;
  document.getElementById('stat-medium').textContent = counts.medium;
  document.getElementById('stat-low').textContent = counts.low;
  document.getElementById('stat-total').textContent = filteredAlerts.length;
}

// ── MAP ──
function renderMap() {
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};

  filteredAlerts.forEach(alert => {
    const color = SEV_COLOR[alert.severity] || '#4caf7d';
    const icon = L.divIcon({
      className: '',
      html: `<div style="
        color:${color};
        cursor:pointer;
      " class="map-marker">
        <div class="map-marker-pulse"></div>
        <div class="map-marker-core" style="background:${color};"></div>
      </div>`,
      iconSize: [18, 18],
      iconAnchor: [9, 9]
    });

    const marker = L.marker([alert.lat, alert.lon], { icon })
      .addTo(map)
      .bindPopup(buildPopup(alert), { className: 'custom-popup', maxWidth: 260 });

    marker.on('click', () => selectAlert(alert.id));
    markers[alert.id] = marker;
  });
}

function buildPopup(a) {
  const color = SEV_COLOR[a.severity] || '#4caf7d';
  const ts = a.timestamp ? new Date(a.timestamp).toLocaleString('es-AR') : '—';
  return `<div class="popup-content">
    <h4>${a.subject}</h4>
    <div class="popup-row"><span>Severidad</span><span style="color:${color};font-weight:600;text-transform:uppercase">${a.severity}</span></div>
    <div class="popup-row"><span>IP</span><span>${a.ip}</span></div>
    <div class="popup-row"><span>Ubicación</span><span>${a.city}, ${a.country}</span></div>
    <div class="popup-row"><span>Fecha</span><span>${ts}</span></div>
    <div class="popup-row" style="margin-top:6px; color:#27F5EE; font-size:15px;">${a.description}</div>
  </div>`;
}

// ── TIMELINE ──
function renderTimeline() {
  const track = document.getElementById('timeline-track');
  track.querySelectorAll('.tl-event, .tl-scale-tick, .tl-scale-label').forEach(e => e.remove());

  track.style.width = '100%';

  if (!filteredAlerts.length) return;

  const sorted = [...filteredAlerts].sort((a, b) => a.timestamp.localeCompare(b.timestamp));
  const times = sorted.map(a => new Date(a.timestamp).getTime()).filter(t => !isNaN(t));
  if (!times.length) return;

  const minT = Math.min(...times);
  const maxT = Math.max(...times);
  const range = maxT - minT || 1;
  const PADDING = 110;
  const W = Math.max(track.offsetWidth, sorted.length * 50);
  track.style.width = W + 'px';
  let previousX = -Infinity;
  let lane = 0;

  renderTimelineScale(track, minT, maxT, W, PADDING);

  sorted.forEach((alert, index) => {
    const t = new Date(alert.timestamp).getTime();
    if (isNaN(t)) return;
    const pct = (t - minT) / range;
    const x = PADDING + pct * (W - PADDING * 2);
    if (x - previousX < 88) {
      lane = (lane + 1) % 2;
    } else {
      lane = 0;
    }
    previousX = x;

    const color = SEV_COLOR[alert.severity] || '#4caf7d';
    const label = String(index + 1).padStart(2, '0');
    const lineHeight = lane === 0 ? 16 : 34;
    const dotMarginTop = lane === 0 ? 24 : 6;
    const labelTop = lane === 0 ? 54 : 78;
    const labelHalfWidth = 16;
    const labelLeft = Math.min(Math.max(x, labelHalfWidth), W - labelHalfWidth);

    const el = document.createElement('div');
    el.className = 'tl-event' + (alert.id === selectedId ? ' active' : '');
    el.dataset.id = alert.id;
    el.style.left = x + 'px';
    el.style.color = color;
    el.innerHTML = `
      <div class="tl-line" style="height:${lineHeight}px"></div>
      <div class="tl-dot" style="background:${color}; border-color:var(--bg2); margin-top:${dotMarginTop}px"></div>
      <div class="tl-label" style="top:${labelTop}px; left:${labelLeft - x}px">${label}</div>
    `;
    el.addEventListener('click', () => selectAlert(alert.id));
    track.appendChild(el);
  });
}

function renderTimelineScale(track, minT, maxT, width, padding) {
  const span = maxT - minT;
  const DAY = 24 * 60 * 60 * 1000;
  const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

  let ticks = [];
  let formatLabel;

  if (span > 90 * DAY) {
    let cursor = new Date(minT);
    cursor = new Date(Date.UTC(cursor.getUTCFullYear(), cursor.getUTCMonth(), 1));
    while (cursor.getTime() <= maxT) {
      ticks.push(cursor.getTime());
      cursor = new Date(Date.UTC(cursor.getUTCFullYear(), cursor.getUTCMonth() + 1, 1));
    }
    formatLabel = ts => {
      const d = new Date(ts);
      return `${monthNames[d.getUTCMonth()]}/${d.getUTCFullYear()}`;
    };
  } else if (span > 3 * DAY) {
    let cursor = new Date(minT);
    cursor = new Date(Date.UTC(cursor.getUTCFullYear(), cursor.getUTCMonth(), cursor.getUTCDate()));
    while (cursor.getTime() <= maxT) {
      ticks.push(cursor.getTime());
      cursor = new Date(cursor.getTime() + DAY);
    }
    formatLabel = ts => {
      const d = new Date(ts);
      return `${monthNames[d.getUTCMonth()]}/${d.getUTCFullYear()}`;
    };
  } else {
    const stepHours = span > DAY ? 6 : 3;
    const step = stepHours * 60 * 60 * 1000;
    let cursor = Math.floor(minT / step) * step;
    while (cursor <= maxT) {
      ticks.push(cursor);
      cursor += step;
    }
    formatLabel = ts => {
      const d = new Date(ts);
      return `${monthNames[d.getUTCMonth()]}/${d.getUTCFullYear()}`;
    };
  }

  const range = span || 1;
  let lastRenderedLabel = '';
  ticks.forEach(tickTime => {
    const pct = (tickTime - minT) / range;
    const x = padding + pct * (width - padding * 2);
    if (x < 24 || x > width - 24) return;

    const tick = document.createElement('div');
    tick.className = 'tl-scale-tick';
    tick.style.left = `${x}px`;

    const label = document.createElement('div');
    label.className = 'tl-scale-label';
    label.style.left = `${x}px`;
    label.textContent = formatLabel(tickTime);

    track.appendChild(tick);
    if (label.textContent !== lastRenderedLabel) {
      track.appendChild(label);
      lastRenderedLabel = label.textContent;
    }
  });
}

// ── LIST ──
function renderList() {
  const list = document.getElementById('alerts-list');
  const empty = document.getElementById('empty-state');

  if (!filteredAlerts.length) {
    list.innerHTML = '';
    list.appendChild(empty);
    empty.style.display = 'flex';
    document.getElementById('alert-count').textContent = '0 events';
    document.getElementById('detail-panel').classList.remove('visible');
    return;
  }

  empty.style.display = 'none';
  document.getElementById('alert-count').textContent = filteredAlerts.length + ' events';

  const sorted = [...filteredAlerts].sort((a, b) => b.timestamp.localeCompare(a.timestamp));

  list.innerHTML = '';
  sorted.forEach(alert => {
    const color = SEV_COLOR[alert.severity] || '#4caf7d';
    const ts = alert.timestamp ? new Date(alert.timestamp).toLocaleString('es-AR', { dateStyle: 'short', timeStyle: 'short' }) : '—';

    const item = document.createElement('div');
    item.className = 'alert-item' + (alert.id === selectedId ? ' selected' : '');
    item.dataset.id = alert.id;
    item.innerHTML = `
      <div class="alert-sev-bar" style="background:${color}"></div>
      <div class="alert-body">
        <div class="alert-subject">${alert.subject}</div>
        <div class="alert-meta">
          <span>${ts}</span>
          <span>${alert.ip}</span>
          <span>${alert.city}, ${alert.country}</span>
        </div>
      </div>
      <span class="sev-badge bg-${alert.severity}">${alert.severity}</span>
    `;
    item.addEventListener('click', () => selectAlert(alert.id));
    list.appendChild(item);
  });
}

// ── SELECT ──
function selectAlert(id) {
  selectedId = id;
  const alert = allAlerts.find(a => a.id == id);
  if (!alert) return;

  // Update list
  document.querySelectorAll('.alert-item').forEach(el => {
    el.classList.toggle('selected', el.dataset.id == id);
  });

  // Update timeline
  document.querySelectorAll('.tl-event').forEach(el => {
    el.classList.toggle('active', el.dataset.id == id);
  });

  // Fly to marker
  if (markers[id]) {
    map.flyTo([alert.lat, alert.lon], 18, { duration: 1.2 });
    markers[id].openPopup();
  }

  // Detail panel
  showDetail(alert);
}

function showDetail(a) {
  const panel = document.getElementById('detail-panel');
  const color = SEV_COLOR[a.severity] || '#4caf7d';
  const ts = a.timestamp ? new Date(a.timestamp).toLocaleString('es-AR') : '—';

  panel.innerHTML = `
    <div class="detail-title">${a.subject}</div>
    <div class="detail-grid">
      <span class="detail-key">id</span><span class="detail-val">${a.id}</span>
      <span class="detail-key">timestamp</span><span class="detail-val">${ts}</span>
      <span class="detail-key">ip</span><span class="detail-val">${a.ip}</span>
      <span class="detail-key">ubicación</span><span class="detail-val">${a.city}, ${a.country}</span>
      <span class="detail-key">coordenadas</span><span class="detail-val">${a.lat.toFixed(4)}, ${a.lon.toFixed(4)}</span>
      <span class="detail-key">severidad</span><span class="detail-val" style="color:${color};text-transform:uppercase;font-weight:600">${a.severity}</span>
    </div>
    <div class="detail-desc">${a.description}</div>
  `;
  panel.classList.add('visible');
}

// ── CSV LOADER DESDE CARPETA RAÍZ ──
const CSV_FILE = 'alerts.csv';

window.addEventListener('load', () => {
  fetch(CSV_FILE)
    .then(res => {
      if (!res.ok) throw new Error(`No se pudo cargar "${CSV_FILE}" (HTTP ${res.status})`);
      return res.text();
    })
    .then(text => {
      const parsed = Papa.parse(text, { header: true, skipEmptyLines: true });
      loadData(parsed.data);
    })
    .catch(err => {
      console.error(err);
      const empty = document.getElementById('empty-state');
      empty.innerHTML = `
        <div class="empty-icon">⚠</div>
        <div style="color:var(--high)">No se encontró ${CSV_FILE}</div>
        <div style="margin-top:6px;font-size:9px;">Asegurate de tener <strong>${CSV_FILE}</strong> en la misma carpeta que este HTML</div>
        <div style="margin-top:4px;font-size:9px;color:#2a4050;">O usá el botón "Load CSV" para cargarlo manualmente</div>
      `;
      empty.style.display = 'flex';
    });
});

</script>
